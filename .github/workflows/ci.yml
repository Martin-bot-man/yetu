name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yetu-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: yetu-backend/package-lock.json
      - run: npm ci
      - run: npm run check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yetu-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: yetu-frontend/package-lock.json
      - run: npm ci
      - run: npm run build
