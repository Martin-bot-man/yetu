services:
  mongo:
    image: mongo:7
    container_name: yetu-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./yetu-backend
      dockerfile: Dockerfile
    container_name: yetu-backend
    restart: unless-stopped
    env_file:
      - ./yetu-backend/.env
    environment:
      NODE_ENV: production
      PORT: 8000
      MONGODB_URI: mongodb://mongo:27017/yetu-pos
      CLIENT_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./yetu-frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: /api
    container_name: yetu-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data:
